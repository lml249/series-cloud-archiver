name: Public safety scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for private network examples
        run: |
          if grep -RInE '[0-9]{1,3}(\.[0-9]{1,3}){3}' . \
            --exclude-dir=.git; then
            echo "IP address-like value found. Use .local placeholders instead."
            exit 1
          fi
      - name: Scan for assignment-like secrets outside approved examples
        run: |
          if grep -RInEi '(token|cookie|password|passwd|api[_-]?key|secret)\s*[:=]' . \
            --exclude-dir=.git \
            --exclude=.env.example \
            --exclude=public-safety.yml; then
            echo "Potential secret assignment found. Keep real secrets out of repo."
            exit 1
          fi
